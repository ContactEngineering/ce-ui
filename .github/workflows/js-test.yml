name: Test JavaScript code

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: ['22']

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up node ${{ matrix.node-version }}
      uses: actions/setup-node@v7
      with:
        node-version: ${{ matrix.node-version }}
        cache: npm

    - name: Install dependencies
      run: |
        npm ci

    - name: Run unit tests
      run: |
        npm test

    - name: Check that the webpack bundle builds
      run: |
        npm run build-prod
