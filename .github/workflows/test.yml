name: Test code functionality

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: topobank-test
        ports:
          - 5432:5432

    env:
      USE_DOCKER: no
      DJANGO_SETTINGS_MODULE: ce_ui.settings.test
      DATABASE_URL: postgres://postgres:secret@localhost/topobank-test

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up python3 ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install
      run: |
        pip install --upgrade pip pip-tools
        pushd /tmp
        git clone -b 26_split_topobank https://github.com/ContactEngineering/topobank.git
        git clone -b 26_split_topobank https://github.com/ContactEngineering/topobank-rest-api.git
        git clone -b 26_split_topobank https://github.com/ContactEngineering/topobank-statistics.git
        git clone -b 26_split_topobank https://github.com/ContactEngineering/topobank-contact.git
        git clone -b 26_split_topobank https://github.com/ContactEngineering/topobank-publication.git
        popd
        pip install /tmp/topobank /tmp/topobank-rest-api /tmp/topobank-statistics /tmp/topobank-contact /tmp/topobank-publication .[dev]

    - name: Test
      run: PYTHONPATH=/tmp/topobank pytest -v
